<div class="content"><h1>Policy-24-0030 · Subnet Mask 설정값 범위 통일</h1>
<h2>결정 사항</h2>
<ul>
<li>장치 간 Subnet Mask 범위 통일: <strong>8(255.0.0.0) ~ 30(255.255.255.252)</strong>, 디폴트 24(255.255.255.0).</li>
</ul>

<ul>
<li>장치별 범위가 다름(16 미만 값 유무 차이).</li>
</ul>
